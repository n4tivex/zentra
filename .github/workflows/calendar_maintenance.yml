name: Calendar Maintenance

on:
  schedule:
    - cron: "0 1 1 * *"
  workflow_dispatch:

jobs:
  validate-calendar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate calendar source
        run: python scripts/check_market_calendar.py --require-next-year
